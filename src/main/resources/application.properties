spring.application.name=hrms
server.port=${SERVER_PORT:8080}

# Database (credentials loaded from .env file)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hrms_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Load .env file
spring.config.import=optional:file:.env[.properties],optional:file:Nexora_HRMS_backend/.env[.properties]

# Notification Settings
app.notification.simulation-mode=${NOTIFICATION_SIMULATION:true}

# Mail Configuration (Credentials should be in .env)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
